name: RepoTalk CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── AI Service (FastAPI) Tests + Coverage ────────────────────────────────
  test-ai-service:
    name: AI Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai_service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest -q --maxfail=1 --cov=app --cov-report=term-missing --cov-report=xml
        env:
          LLM_PROVIDER: ollama
          QDRANT_URL: http://localhost:6333
          QDRANT_API_KEY: ""
          GROQ_API_KEY: test-key

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-coverage
          path: ai_service/coverage.xml

  # ─── Gateway (Node.js) Build + Type Check ─────────────────────────────────
  test-gateway:
    name: Gateway Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build (TypeScript)
        run: npm run build

  # ─── Frontend Type Check + Lint + Build ───────────────────────────────────
  test-frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── Deploy (main branch only) ────────────────────────────────────────────
  # Render auto-deploys when this workflow passes.
  # Vercel auto-deploys from GitHub integration (no action needed).
  deploy-notify:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [test-ai-service, test-gateway, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Notify deploy ready
        run: echo "✅ All checks passed — Render and Vercel will auto-deploy from main."
